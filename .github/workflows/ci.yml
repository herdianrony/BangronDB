name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.1', '8.2', '8.3', '8.4', '8.5']

    name: PHP ${{ matrix.php-version }} Tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: pdo_sqlite, openssl
          coverage: xdebug

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Execute tests
        run: composer test

      - name: Execute tests with coverage
        if: matrix.php-version == '8.5'
        run: composer test-coverage

  lint:
    runs-on: ubuntu-latest
    name: Lint Check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo_sqlite, openssl

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Check syntax errors (src + tests)
        run: composer lint

      - name: Check syntax errors (examples)
        run: find examples/ -name "*.php" -not -path "examples/secure-bootstrap/*" -exec php -l {} \;

  # Enforce that every test file ends with `Test.php` so phpunit's
  # `<directory suffix="Test.php">` discovery includes it. A file named
  # e.g. `FooTest_v120.php` would silently be skipped by the suite.
  test-naming:
    runs-on: ubuntu-latest
    name: Test File Naming Convention
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo_sqlite, openssl

      - name: Verify all test files end with Test.php
        run: |
          set -e
          echo "Checking that every file in tests/ ends with Test.php ..."
          # Find PHP files in tests/ that do NOT end with Test.php
          bad=$(find tests/ -name "*.php" ! -name "*Test.php" -print)
          if [ -n "$bad" ]; then
            echo "::error::The following test files do not end with 'Test.php' and will NOT be discovered by phpunit:"
            echo "$bad"
            echo ""
            echo "Rename them to end with 'Test.php' (e.g. SecurityValidationV120Test.php, not SecurityValidationTest_v120.php)"
            exit 1
          fi
          echo "✓ All test files follow the *Test.php naming convention."

  static-analysis:
    runs-on: ubuntu-latest
    name: Static Analysis
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo_sqlite, openssl

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run PHPStan
        run: composer analyze
