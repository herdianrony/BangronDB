<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BangronDB — MongoDB-style Document Database on SQLite</title>
    <meta name="description" content="BangronDB: Document database fleksibel untuk PHP dengan API mirip MongoDB, dibangun di atas SQLite. Enkripsi AES-256-GCM, schema validation, aggregation pipeline." />
    <meta name="keywords" content="BangronDB, PHP, SQLite, document database, MongoDB API, encryption, schema validation" />
    <meta name="author" content="Herdian Rony" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      // Prevent FOUC for dark mode
      (function() {
        var t = localStorage.getItem('bangrondb-theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
