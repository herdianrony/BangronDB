<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="40" x2="1080" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(294 132) rotate(50.71) scale(382.648 512.945)">
      <stop stop-color="#2563EB" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(984 544) rotate(-137.489) scale(306.265 232.427)">
      <stop stop-color="#10B981" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="710" y1="122" x2="1028" y2="510" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowA)"/>
  <rect width="1200" height="630" fill="url(#glowB)"/>

  <g opacity="0.95">
    <rect x="94" y="96" width="158" height="158" rx="36" fill="url(#card)"/>
    <rect x="136" y="126" width="74" height="98" rx="18" fill="#0F172A" stroke="#DBEAFE" stroke-width="8"/>
    <rect x="150" y="152" width="46" height="8" rx="4" fill="#BFDBFE"/>
    <rect x="150" y="172" width="46" height="8" rx="4" fill="#93C5FD"/>
    <rect x="150" y="192" width="30" height="8" rx="4" fill="#60A5FA"/>
  </g>

  <text x="94" y="336" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="72" font-weight="800">BangronDB</text>
  <text x="94" y="392" fill="#BFDBFE" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="600">SQLite document database for PHP</text>
  <text x="94" y="454" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="26">
    MongoDB-like API • AES-256-GCM • Searchable Fields
  </text>
  <text x="94" y="494" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="26">
    Explicit database &amp; collection lifecycle API
  </text>

  <g>
    <rect x="712" y="116" width="392" height="398" rx="32" fill="#0B1220" fill-opacity="0.92" stroke="#334155"/>
    <rect x="744" y="154" width="168" height="26" rx="13" fill="#172554"/>
    <text x="760" y="172" fill="#DBEAFE" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">Quick Start</text>
    <text x="744" y="218" fill="#7DD3FC" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="19">$client = new Client('/data');</text>
    <text x="744" y="254" fill="#C4B5FD" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="19">$client-&gt;createDB('app');</text>
    <text x="744" y="290" fill="#C4B5FD" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="19">$client-&gt;createCollection('app', 'users');</text>
    <text x="744" y="326" fill="#86EFAC" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="19">$users = $client-&gt;selectCollection('app', 'users');</text>
    <text x="744" y="380" fill="#FDE68A" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="19">$id = $users-&gt;insert([...]);</text>
    <text x="744" y="416" fill="#E2E8F0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="19">$user = $users-&gt;findOne(['_id' =&gt; $id]);</text>
    <rect x="744" y="456" width="296" height="28" rx="14" fill="#1E293B"/>
    <text x="760" y="475" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">Non-lazy selection • explicit creation</text>
  </g>
</svg>
